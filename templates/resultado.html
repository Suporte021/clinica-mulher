<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Medicina Doc</title>

<!-- FONTES -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Yesteryear&display=swap" rel="stylesheet">

<!-- ICONES -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Poppins",sans-serif;
    background:#f7f4f4;
}

/* HEADER */
header{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    background:#fec2cd;
    height:60px;
    color:white;
    padding:0 15px;
    position:relative;
}

header h1{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    font-family:"Yesteryear",cursive;
    font-size:32px;
}

.user{
    font-weight:600;
}

/* HERO */
.hero{
    display:flex;
    align-items:center;
    justify-content:space-between;
    max-width:1100px;
    margin:auto;
    padding:30px;
}

.box-txt{
    width:50%;
}

.box-txt h2{
    color:#fa899d;
    font-size:32px;
}

.box-txt p{
    color:#555;
    margin:10px 0;
}

.btn{
    display:inline-block;
    margin-top:10px;
    background:#fa899d;
    color:white;
    padding:10px 15px;
    border-radius:5px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#f65f7a;
}

/* ICONES */
.icon{
    color:#fa899d;
    margin-right:5px;
}

/* CARDS */
.cards{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    padding:20px;
}

.card{
    background:white;
    width:280px;
    margin:10px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card i{
    font-size:30px;
    color:#fa899d;
    margin-bottom:10px;
}

/* FOOTER */
footer{
    background:#fec2cd;
    text-align:center;
    padding:10px;
    color:white;
    margin-top:20px;
}

/* RESPONSIVO */
@media(max-width:700px){
    .hero{
        flex-direction:column;
        text-align:center;
    }

    .box-txt{
        width:100%;
    }
}
</style>
</head>

<body>

<header>
    <div class="user">
        <i class="fa fa-user"></i> {{usuario}}
    </div>
    <h1>MedDoc</h1>
</header>

<section class="hero">
    <div class="box-txt">
        <h2><i class="fa fa-heart-pulse icon"></i> Medicina Moderna</h2>

        <p>
            Tecnologia + ciência salvando vidas todos os dias.
        </p>

        <a href="#" class="btn">
            <i class="fa fa-stethoscope"></i> Explorar
        </a>
    </div>
</section>

<section class="cards">

    <div class="card">
        <i class="fa fa-robot"></i>
        <h3>IA na Medicina</h3>
        <p>Diagnósticos mais rápidos e precisos.</p>
    </div>

    <div class="card">
        <i class="fa fa-hospital"></i>
        <h3>Hospitais Modernos</h3>
        <p>Equipamentos de última geração.</p>
    </div>

    <div class="card">
        <i class="fa fa-user-doctor"></i>
        <h3>Profissionais</h3>
        <p>Médicos altamente capacitados.</p>
    </div>

</section>

<footer>
    © 2026 - Medicina Doc
</footer>

</body>
</html>
